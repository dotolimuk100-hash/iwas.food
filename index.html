<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전생테스트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111;--ink2:#333;--ink3:#777;
  --paper:#f4f1e8;--paper2:#eae6da;--white:#fffef9;--shadow:#bbb;
  --c1:#f4f1e8;--c2:#eee9d8;--c3:#e8e2cf;--c4:#f0ece0;
}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',sans-serif;font-size:16px;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(0,0,0,0.04) 31px,rgba(0,0,0,0.04) 32px);pointer-events:none;z-index:0;}
.wrap{max-width:640px;margin:0 auto;padding:2rem 1.4rem 5rem;position:relative;z-index:1;}
.wavy{width:100%;height:22px;margin:.5rem 0;display:block;}

/* 인트로 */
.intro-title{text-align:center;padding:2rem 1rem 1.2rem;}
.intro-title h1{font-size:2.4rem;font-weight:900;line-height:1.35;letter-spacing:-0.03em;color:var(--ink);}
.intro-box{background:var(--white);border:2px solid var(--ink);padding:1.3rem 1.6rem;margin:1.2rem 0 1.8rem;box-shadow:4px 4px 0 var(--shadow);font-size:1rem;font-weight:400;line-height:2;color:var(--ink2);}
.start-btn{font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:1.2rem;padding:.8rem 3.5rem;background:var(--ink);color:var(--paper);border:2px solid var(--ink);cursor:pointer;position:relative;transition:all .13s;letter-spacing:.06em;display:block;margin:0 auto;}
.start-btn::after{content:'';position:absolute;bottom:-5px;right:-5px;width:100%;height:100%;border:2px solid var(--ink);z-index:-1;}
.start-btn:hover{transform:translate(-2px,-2px);}

/* 진행 */
.prog-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.3rem;}
.prog-label{font-size:.85rem;font-weight:700;color:var(--ink3);white-space:nowrap;}
.prog-track{flex:1;height:3px;background:#ccc;border-radius:2px;position:relative;}
.prog-fill{position:absolute;left:0;top:0;height:100%;background:var(--ink);border-radius:2px;transition:width .4s ease;}

/* 질문 카드 */
.q-card{background:var(--white);border:2px solid var(--ink);padding:1.8rem 1.8rem 1.6rem;margin-bottom:1.4rem;box-shadow:4px 4px 0 var(--shadow);}
.q-num{font-size:.8rem;font-weight:700;color:var(--ink3);letter-spacing:.12em;margin-bottom:.4rem;}
.q-text{font-size:1.2rem;font-weight:700;line-height:1.6;color:var(--ink);margin-bottom:1.5rem;}

/* 선지 */
.opts{display:flex;flex-direction:column;gap:.5rem;}
.opt-btn{background:transparent;border:1.5px solid #c0b9a8;cursor:pointer;padding:.7rem 1rem;text-align:left;font-family:'Noto Sans KR',sans-serif;font-size:.95rem;font-weight:400;color:var(--ink);transition:all .12s;display:flex;align-items:flex-start;gap:.7rem;line-height:1.6;}
.opt-btn:hover{border-color:var(--ink);background:rgba(0,0,0,0.03);}
.opt-btn.sel{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.opt-lbl{font-weight:700;min-width:18px;opacity:.5;flex-shrink:0;}
.opt-btn.sel .opt-lbl{opacity:1;}

/* 동그란 버튼 슬라이더 */
.dot-wrap{margin-bottom:1.4rem;}
.dot-labels{display:flex;justify-content:space-between;font-size:.88rem;font-weight:500;color:var(--ink2);margin-bottom:.9rem;}
.dot-track{position:relative;display:flex;align-items:center;justify-content:space-between;padding:0 2px;}
.dot-track::before{content:'';position:absolute;left:11px;right:11px;top:50%;height:1.5px;background:#c0b9a8;transform:translateY(-50%);z-index:0;}
.dot-btn{width:24px;height:24px;border-radius:50%;border:2px solid #c0b9a8;background:var(--white);cursor:pointer;position:relative;z-index:1;transition:all .12s;flex-shrink:0;outline:none;}
.dot-btn:hover{border-color:var(--ink);transform:scale(1.15);}
.dot-btn.sel{background:var(--ink);border-color:var(--ink);transform:scale(1.3);}
.dot-nums{display:flex;justify-content:space-between;margin-top:.45rem;padding:0 4px;}
.dot-nums span{font-size:.72rem;color:var(--ink3);width:24px;text-align:center;}
.dot-nums span.active{color:var(--ink);font-weight:700;}

/* 색상 */
.color-grid{display:flex;flex-wrap:wrap;gap:.65rem;margin-top:.2rem;}
.color-btn{width:44px;height:44px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .12s;}
.color-btn:hover{transform:scale(1.12);}
.color-btn.sel{border:2.5px solid var(--ink);box-shadow:0 0 0 2.5px var(--paper),0 0 0 5px var(--ink);}

/* 멀티 슬라이더 */
.multi-item{margin-bottom:1.6rem;}
.multi-item:last-child{margin-bottom:0;}

/* 네비 */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.4rem;}
.nav-btn{font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:1rem;padding:.55rem 1.5rem;background:transparent;border:2px solid var(--ink);cursor:pointer;color:var(--ink);position:relative;transition:all .12s;}
.nav-btn::after{content:'';position:absolute;bottom:-3px;right:-3px;width:100%;height:100%;border:2px solid var(--shadow);z-index:-1;}
.nav-btn:hover{background:var(--ink);color:var(--paper);}
.nav-btn:disabled{opacity:.25;cursor:not-allowed;}
.nav-btn.pri{background:var(--ink);color:var(--paper);}

/* ===== 결과 ===== */
.result-wrap{text-align:center;padding:.5rem 0 3rem;}

/* 메인 결과 카드 */
.save-card{background:var(--paper);border:2px solid var(--ink);box-shadow:5px 5px 0 var(--shadow);margin-bottom:1.4rem;overflow:hidden;}

/* 상단: 썸네일 + 이름 */
.card-top{background:var(--c1);padding:2rem 1.8rem 1.5rem;border-bottom:2px solid var(--ink);display:flex;flex-direction:column;align-items:center;}
.thumb-area{width:200px;height:200px;border:2px solid var(--ink);background:var(--paper2);overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:1rem;flex-shrink:0;}
.thumb-area img{width:100%;height:100%;object-fit:cover;}
.thumb-ph{font-size:.85rem;font-weight:500;color:var(--ink3);text-align:center;line-height:1.6;padding:.5rem;}
.result-name{font-size:2rem;font-weight:900;letter-spacing:-0.03em;color:var(--ink);line-height:1.2;}

/* 설명 */
.card-desc{background:var(--c2);padding:1.3rem 1.8rem;border-bottom:2px solid var(--ink);font-size:.9rem;font-weight:400;line-height:2;color:var(--ink2);text-align:left;word-break:keep-all;}

/* 궁합 행 */
.card-compat{display:grid;grid-template-columns:1fr 1fr;}
.compat-cell{padding:1.2rem 1rem;text-align:center;}
.compat-cell:first-child{background:var(--c3);border-right:2px solid var(--ink);}
.compat-cell:last-child{background:var(--c4);}
.compat-cell h4{font-size:.75rem;font-weight:700;color:var(--ink3);margin-bottom:.8rem;letter-spacing:.06em;}
.compat-thumbs{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;}
.compat-item{display:flex;flex-direction:column;align-items:center;gap:.3rem;}
.compat-thumb{width:56px;height:56px;border:2px solid var(--ink);background:var(--paper2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.compat-thumb img{width:100%;height:100%;object-fit:cover;}
.compat-thumb-ph{font-size:.55rem;color:var(--ink3);text-align:center;padding:2px;}
.compat-name{font-size:.7rem;font-weight:700;color:var(--ink);max-width:64px;text-align:center;line-height:1.3;word-break:keep-all;}

/* 관계도 */
.relation-section{margin-top:1.2rem;text-align:left;}
.relation-title{font-size:.9rem;font-weight:700;color:var(--ink3);margin-bottom:.8rem;letter-spacing:.06em;}
.relation-card{background:var(--white);border:2px solid var(--ink);box-shadow:4px 4px 0 var(--shadow);padding:1.4rem;overflow:hidden;}
#relation-svg{width:100%;display:block;}

/* 공유 */
.share-area{margin-top:1.6rem;display:flex;flex-direction:column;align-items:center;gap:.8rem;}
.share-label{font-size:.85rem;font-weight:700;color:var(--ink3);}
.share-btns{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;}
.share-btn{font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:.9rem;padding:.5rem 1.2rem;background:transparent;border:2px solid var(--ink);cursor:pointer;color:var(--ink);position:relative;transition:all .12s;}
.share-btn::after{content:'';position:absolute;bottom:-3px;right:-3px;width:100%;height:100%;border:2px solid var(--shadow);z-index:-1;}
.share-btn:hover{background:var(--ink);color:var(--paper);}
.share-btn.dark{background:var(--ink);color:var(--paper);}
.retry-btn{margin-top:1.8rem;font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:1.1rem;padding:.7rem 2.8rem;background:transparent;border:2px solid var(--ink);cursor:pointer;color:var(--ink);position:relative;transition:all .12s;letter-spacing:.04em;}
.retry-btn::after{content:'';position:absolute;bottom:-4px;right:-4px;width:100%;height:100%;border:2px solid var(--shadow);z-index:-1;}
.retry-btn:hover{background:var(--ink);color:var(--paper);}

.hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">

  <!-- 인트로 -->
  <div id="intro-screen">
    <div class="intro-title">
      <svg class="wavy" viewBox="0 0 400 22" fill="none"><path d="M8 11 Q50 2 92 11 Q134 20 176 11 Q218 2 260 11 Q302 20 344 11 Q372 4 392 11" stroke="#111" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
      <h1>나는 전생에<br>어떤 음식이었을까?</h1>
      <svg class="wavy" viewBox="0 0 400 22" fill="none"><path d="M8 11 Q50 20 92 11 Q134 2 176 11 Q218 20 260 11 Q302 2 344 11 Q372 18 392 11" stroke="#111" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
    </div>
    <div class="intro-box">당신이 전생에 음식이었다면... 과연 어떤 음식이었을까요?<br>총 14개의 질문으로 당신의 전생 음식을 알아봅니다.<br>느끼는 대로 답해주세요!</div>
    <button class="start-btn" onclick="startTest()">시작하기</button>
  </div>

  <!-- 테스트 -->
  <div id="test-screen" class="hidden">
    <div class="prog-row">
      <span class="prog-label" id="prog-label">1 / 14</span>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:7%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-num" id="q-num">Q 1</div>
      <div class="q-text" id="q-text"></div>
      <div id="q-opts"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prev-btn" onclick="prevQ()" disabled>← 이전</button>
      <button class="nav-btn pri" id="next-btn" onclick="nextQ()">다음 →</button>
    </div>
  </div>

  <!-- 결과 -->
  <div id="result-screen" class="hidden">
    <div class="result-wrap">
      <svg class="wavy" viewBox="0 0 400 22" fill="none"><path d="M8 11 Q50 2 92 11 Q134 20 176 11 Q218 2 260 11 Q302 20 344 11 Q372 4 392 11" stroke="#111" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
      <p style="font-size:.85rem;font-weight:700;color:#888;margin:.6rem 0 1rem;letter-spacing:.1em;">당신의 전생은</p>

      <!-- 저장 대상 카드 -->
      <div id="save-card">
        <div class="save-card">
          <div class="card-top">
            <div class="thumb-area">
              <div class="thumb-ph" id="thumb-ph">이미지 준비 중</div>
              <img id="thumb-img" style="display:none;" alt="">
            </div>
            <div class="result-name" id="result-name"></div>
          </div>
          <div class="card-desc" id="result-desc"></div>
          <div class="card-compat">
            <div class="compat-cell">
              <h4>잘 맞는 전생</h4>
              <div class="compat-thumbs" id="compat-good-thumbs"></div>
            </div>
            <div class="compat-cell">
              <h4>다툴 수 있는 전생</h4>
              <div class="compat-thumbs" id="compat-bad-thumbs"></div>
            </div>
          </div>
        </div>

        <!-- 관계도 -->
        <div class="relation-section">
          <div class="relation-title">전생 관계도</div>
          <div class="relation-card">
            <svg id="relation-svg" viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </div>
      </div>

      <div class="share-area">
        <div class="share-label">결과 공유하기</div>
        <div class="share-btns">
          <button class="share-btn dark" onclick="saveImage()">이미지 저장</button>
          <button class="share-btn" onclick="shareX()">X 에 공유</button>
          <button class="share-btn" onclick="copyLink()">링크 복사</button>
        </div>
      </div>
      <button class="retry-btn" onclick="retryTest()">다시 하기</button>
    </div>
  </div>
</div>

<script>
const IMGS = {
  mandu:'images/mandu.png', donkasu:'images/donkasu.png', myulchi:'images/myulchi.png',
  tteok:'images/tteok.png', sundubu:'images/sundubu.png', gamal:'images/gamal.png',
  jangjorim:'images/jangjorim.png', sukju:'images/sukju.png', gimbap:'images/gimbap.png',
  naengmyeon:'images/naengmyeon.png', chwi:'images/chwi.png', mumal:'images/mumal.png',
  gamja:'images/gamja.png', tanghuru:'images/tanghuru.png', bibim:'images/bibim.png',
  yubu:'images/yubu.png'
};

const QS=[
  {id:1,text:"나는 계단을 오를 때 주로?",type:"choice",opts:[
    {l:"a",t:"뛰어올라간다.",ax:{ax1:2,ax3:2}},
    {l:"b",t:"한 칸씩 규칙적으로",ax:{ax1:-2,ax3:-2}},
    {l:"c",t:"두 칸씩 성큼성큼",ax:{ax1:2,ax3:-1}},
    {l:"d",t:"난 한 층 올라갈 때도 엘리베이터를 타지.",ax:{ax1:-1,ax3:1}}
  ]},
  {id:2,text:"단체 사진 찍을 때 나는 보통?",type:"choice",opts:[
    {l:"a",t:"맨 앞에서 브이~",ax:{ax1:2,ax4:2}},
    {l:"b",t:"뒤에 숨곤 해. 앞은 부담스러워.",ax:{ax1:-2,ax4:-2}},
    {l:"c",t:"찍힐 생각은 없고, 찍어줄 거야.",ax:{ax1:-1,ax4:1}},
    {l:"d",t:"그냥 찍히지. 근데 어째선지 표정이 좋진 않아...",ax:{ax1:1,ax4:-1}}
  ]},
  {id:3,text:"샤워할 때 노래 불러?",type:"choice",opts:[
    {l:"a",t:"항상 부름! 곧 욕조에서 콘서트 열 거야.",ax:{ax1:2,ax4:2}},
    {l:"b",t:"가끔 흥얼거리는 듯?",ax:{ax1:-1,ax4:-1}},
    {l:"c",t:"안 불러. 그냥 샤워해.",ax:{ax1:-2,ax4:1}},
    {l:"d",t:"노래 부를 틈도 없이 샤워 자체를 최대한 빨리 끝내.",ax:{ax1:-1,ax4:-2}}
  ]},
  {id:4,text:"모르는 번호로 전화가 왔다. 나는?",type:"choice",opts:[
    {l:"a",t:"바로 받음. 궁금하니까!",ax:{ax1:2,ax3:2}},
    {l:"b",t:"안 받고 문자로 누구냐고 보내.",ax:{ax2:1,ax3:-1}},
    {l:"c",t:"검색해보고 스팸이면 차단.",ax:{ax2:-2,ax3:-2}},
    {l:"d",t:"그냥 무시, 중요하면 다시 걸겠지.",ax:{ax2:-1,ax3:2}}
  ]},
  {id:5,text:"놀이공원에서 인기 많은 어트랙션은 줄 서서 2시간 기다려야 한대. 나는?",type:"choice",opts:[
    {l:"a",t:"그래도 탐, 기다리면서 떠들면 되지!",ax:{ax2:1,ax3:2}},
    {l:"b",t:"기다리는 동안 마음이 오락가락. 떠날까, 말까...",ax:{ax2:2,ax3:-1}},
    {l:"c",t:"덜 붐비는 거 먼저 타고 나중에 옴.",ax:{ax2:-2,ax3:-2}},
    {l:"d",t:"그냥 안 탐, 다른 거 하지 뭐.",ax:{ax2:-1,ax3:1}}
  ]},
  {id:6,text:"친구들이랑 영화 고르는데 의견이 안 맞는다. 나는?",type:"choice",opts:[
    {l:"a",t:"내가 보고 싶은 거 강하게 밀어붙임.",ax:{ax2:-2}},
    {l:"b",t:"친구들이 보고 싶은 거 그냥 따라감.",ax:{ax2:2}},
    {l:"c",t:"평점이랑 리뷰 찾아서 제일 나은 거 제안.",ax:{ax2:-1}},
    {l:"d",t:"아무거나 틀어, 나 상관없어.",ax:{ax2:1}}
  ]},
  {id:7,text:"발표 직전 내 차례가 됐다. 나는?",type:"choice",opts:[
    {l:"a",t:"떨리긴 하는데 어떻게든 됨. 실전에 강한 듯? ㅎㅎ",ax:{ax4:2}},
    {l:"b",t:"머리가 하얘지고 다리가 떨림. 망할 것 같다... 심호흡 해보자.",ax:{ax4:-2}},
    {l:"c",t:"이미 다 외워서 별로 안 떨림. 떨릴 일인가 이게?",ax:{ax4:2}},
    {l:"d",t:"도망가고 싶음. 멀리멀리 도망가는 상상을 해...",ax:{ax4:-2}}
  ]},
  {id:8,text:"식당에서 내 음식만 주문한 거랑 다른 게 나왔다. 가격이 같긴 한데... 어떡할까?",type:"choice",opts:[
    {l:"a",t:"바로 직원 불러서 말할래.",ax:{ax4:2}},
    {l:"b",t:"그냥 먹음, 말하기 귀찮음.",ax:{ax4:-2}},
    {l:"c",t:"부러 직원을 부르진 않지만, 일행들과 수군거림.",ax:{ax4:1}},
    {l:"d",t:"속으로 열받지만 웃으며 먹음.",ax:{ax4:-2}}
  ]},
  {id:9,text:"나의 말 속도는?",type:"dot",leftLabel:"느린 편",rightLabel:"빠른 편",steps:8,axis:"ax1",labels:["1","2","3","4","5","6","7","8"]},
  {id:10,text:"당신의 머리카락 길이는?",type:"choice",opts:[
    {l:"a",t:"빡빡이 (한 올도 없거나 1cm 정도)",ax:{ax4:-1}},
    {l:"b",t:"귀 밑 3cm 미만",ax:{ax4:-1}},
    {l:"c",t:"어깨 위",ax:{ax4:0}},
    {l:"d",t:"어깨에 걸침",ax:{ax4:1}},
    {l:"e",t:"허리까지 닿음",ax:{ax4:1}},
    {l:"f",t:"바닥까지 닿음",ax:{ax4:2}}
  ]},
  {id:11,text:"이 중 가장 마음에 드는 색은?",type:"color",colors:[
    {name:"빨간색",hex:"#CC4444",ax:{ax2:-1}},
    {name:"보라색",hex:"#8877AA",ax:{ax2:1}},
    {name:"분홍색",hex:"#E88899",ax:{ax2:2}},
    {name:"파란색",hex:"#5588AA",ax:{ax2:1}},
    {name:"초록색",hex:"#669966",ax:{ax2:1}},
    {name:"노란색",hex:"#DDAA44",ax:{ax2:-1}},
    {name:"검정색",hex:"#222222",ax:{ax2:-2}},
    {name:"흰색",hex:"#EEEEEE",ax:{ax2:-1}}
  ]},
  {id:12,text:"마지막으로 방구 뀐 순간은 언제?",type:"choice",opts:[

// 이름으로 RS에서 찾기
function findByName(name){ return RS.find(r=>r.name===name); }

let curQ=0, ans={}, dotVals={}, curResult=null;

function startTest(){
  document.getElementById('intro-screen').classList.add('hidden');
  document.getElementById('test-screen').classList.remove('hidden');
  renderQ();
}

// 자동 넘김 없음

function renderQ(){
  const q=QS[curQ];
  document.getElementById('q-num').textContent=`Q ${curQ+1}`;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('prog-label').textContent=`${curQ+1} / ${QS.length}`;
  document.getElementById('prog-fill').style.width=`${((curQ+1)/QS.length)*100}%`;
  document.getElementById('prev-btn').disabled=curQ===0;
  document.getElementById('next-btn').textContent=curQ===QS.length-1?'결과 보기 →':'다음 →';
  const c=document.getElementById('q-opts');
  c.innerHTML='';

  if(q.type==='choice'){
    const d=document.createElement('div');d.className='opts';
    q.opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='opt-btn'+(ans[curQ]===i?' sel':'');
      b.innerHTML=`<span class="opt-lbl">${o.l}.</span><span>${o.t}</span>`;
      b.onclick=()=>{
        ans[curQ]=i;
        d.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel');
      };
      d.appendChild(b);
    });
    c.appendChild(d);
  } else if(q.type==='dot'){
    const cur=dotVals[`${curQ}_0`]!==undefined?dotVals[`${curQ}_0`]:4;
    if(ans[curQ]===undefined)ans[curQ]=cur;
    const w=document.createElement('div');w.className='dot-wrap';
    w.innerHTML=`<div class="dot-labels"><span>${q.leftLabel}</span><span>${q.rightLabel}</span></div>
    <div class="dot-track" id="dt_${curQ}"></div>
    <div class="dot-nums" id="dn_${curQ}"></div>`;
    c.appendChild(w);
    const track=document.getElementById(`dt_${curQ}`);
    const nums=document.getElementById(`dn_${curQ}`);
    for(let i=1;i<=q.steps;i++){
      const b=document.createElement('button');
      b.className='dot-btn'+(cur===i?' sel':'');
      const vi=i;
      b.onclick=()=>{
        dotVals[`${curQ}_0`]=vi;ans[curQ]=vi;
        track.querySelectorAll('.dot-btn').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel');
        nums.querySelectorAll('span').forEach((s,si)=>{s.className=si+1===vi?'active':'';});
      };
      track.appendChild(b);
      const s=document.createElement('span');
      s.textContent=q.labels[i-1];s.className=cur===i?'active':'';
      nums.appendChild(s);
    }
  } else if(q.type==='color'){
    const d=document.createElement('div');d.className='color-grid';
    q.colors.forEach((co,i)=>{
      const b=document.createElement('button');
      b.className='color-btn'+(ans[curQ]===i?' sel':'');
      b.style.background=co.hex;b.title=co.name;
      b.onclick=()=>{
        ans[curQ]=i;
        d.querySelectorAll('.color-btn').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel');
      };
      d.appendChild(b);
    });
    c.appendChild(d);
  } else if(q.type==='multidot'){
    if(ans[curQ]===undefined)ans[curQ]='set';
    q.sliders.forEach((s,i)=>{
      const key=`${curQ}_${i}`;
      const cur=dotVals[key]!==undefined?dotVals[key]:4;
      dotVals[key]=cur;
      const item=document.createElement('div');item.className='multi-item';
      item.innerHTML=`<div class="dot-labels"><span>${s.left}</span><span>${s.right}</span></div>
      <div class="dot-track" id="mdt_${curQ}_${i}"></div>
      <div class="dot-nums" id="mdn_${curQ}_${i}"></div>`;
      c.appendChild(item);
      const track=document.getElementById(`mdt_${curQ}_${i}`);
      const nums=document.getElementById(`mdn_${curQ}_${i}`);
      const labels=['1','2','3','4','5','6','7'];
      for(let v=1;v<=7;v++){
        const b=document.createElement('button');
        b.className='dot-btn'+(cur===v?' sel':'');
        const vv=v;
        b.onclick=()=>{
          dotVals[key]=vv;
          track.querySelectorAll('.dot-btn').forEach(x=>x.classList.remove('sel'));
          b.classList.add('sel');
          nums.querySelectorAll('span').forEach((sp,si)=>{sp.className=si+1===vv?'active':'';});
        };
        track.appendChild(b);
        const sp=document.createElement('span');
        sp.textContent=labels[v-1];sp.className=cur===v?'active':'';
        nums.appendChild(sp);
      }
    });
  }
}

function nextQ(){if(curQ===QS.length-1){showResult();return;}curQ++;renderQ();}
function prevQ(){if(curQ>0){curQ--;renderQ();}}

// 썸네일 만들기 헬퍼
function makeThumb(imgKey, name, size){
  const wrap=document.createElement('div');
  wrap.className='compat-item';
  const box=document.createElement('div');
  box.className='compat-thumb';
  box.style.width=size+'px';box.style.height=size+'px';
  const img=document.createElement('img');
  img.style.width='100%';img.style.height='100%';img.style.objectFit='cover';
  const ph=document.createElement('div');
  ph.className='compat-thumb-ph';ph.textContent=name;
  img.onload=()=>{img.style.display='block';ph.style.display='none';};
  img.onerror=()=>{img.style.display='none';ph.style.display='flex';ph.style.alignItems='center';ph.style.justifyContent='center';};
  img.src=IMGS[imgKey]||'';
  box.appendChild(ph);box.appendChild(img);
  const label=document.createElement('div');
  label.className='compat-name';label.textContent=name;
  wrap.appendChild(box);wrap.appendChild(label);
  return wrap;
}

// 관계도 SVG 그리기
function drawRelation(me, goodList, badList){
  const svg=document.getElementById('relation-svg');
  svg.innerHTML='';
  const ns='http://www.w3.org/2000/svg';

  // 스케치 필터
  const defs=document.createElementNS(ns,'defs');
  defs.innerHTML=`<filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" seed="2" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
  </filter>`;
  svg.appendChild(defs);

  // 노드 위치: 나(중앙), good들(위), bad들(아래)
  const W=560, H=300;
  const mePos={x:W/2, y:H/2};

  // good: 상단
  const goodPos=goodList.map((g,i)=>({
    x: W/2 + (i===0?-130:130),
    y: 70
  }));
  // bad: 하단
  const badPos=badList.map((b,i)=>({
    x: W/2 + (i===0?-130:130),
    y: H-70
  }));

  const RBOX=44; // 썸네일 박스 크기

  // 화살표 마커
  const arrowGood=document.createElementNS(ns,'marker');
  arrowGood.setAttribute('id','arrowGood');
  arrowGood.setAttribute('markerWidth','8');arrowGood.setAttribute('markerHeight','8');
  arrowGood.setAttribute('refX','6');arrowGood.setAttribute('refY','3');
  arrowGood.setAttribute('orient','auto');
  arrowGood.innerHTML=`<path d="M0,0 L0,6 L8,3 z" fill="#444"/>`;
  defs.appendChild(arrowGood);

  const arrowBad=document.createElementNS(ns,'marker');
  arrowBad.setAttribute('id','arrowBad');
  arrowBad.setAttribute('markerWidth','8');arrowBad.setAttribute('markerHeight','8');
  arrowBad.setAttribute('refX','6');arrowBad.setAttribute('refY','3');
  arrowBad.setAttribute('orient','auto');
  arrowBad.innerHTML=`<path d="M0,0 L0,6 L8,3 z" fill="#999"/>`;
  defs.appendChild(arrowBad);

  // 연결선 그리기 함수 (스케치 느낌 - 약간 구불구불)
  function drawLine(x1,y1,x2,y2,color,dash,markerId){
    const mx=(x1+x2)/2+((Math.random()-0.5)*20);
    const my=(y1+y2)/2+((Math.random()-0.5)*10);
    const path=document.createElementNS(ns,'path');
    path.setAttribute('d',`M${x1},${y1} Q${mx},${my} ${x2},${y2}`);
    path.setAttribute('stroke',color);
    path.setAttribute('stroke-width','1.8');
    path.setAttribute('fill','none');
    path.setAttribute('stroke-dasharray',dash||'');
    if(markerId) path.setAttribute('marker-end',`url(#${markerId})`);
    path.setAttribute('filter','url(#sketch)');
    svg.appendChild(path);
  }

  // good 연결 (실선)
  goodPos.forEach(gp=>{
    drawLine(mePos.x, mePos.y-RBOX/2, gp.x, gp.y+RBOX/2, '#444','','arrowGood');
  });
  // bad 연결 (점선)
  badPos.forEach(bp=>{
    drawLine(mePos.x, mePos.y+RBOX/2, bp.x, bp.y-RBOX/2, '#aaa','5,4','arrowBad');
  });

  // 노드 그리기 함수
  function drawNode(pos, r, label, isMe){
    const g=document.createElementNS(ns,'g');

    // 외곽 박스
    const rect=document.createElementNS(ns,'rect');
    rect.setAttribute('x',pos.x-RBOX/2);rect.setAttribute('y',pos.y-RBOX/2);
    rect.setAttribute('width',RBOX);rect.setAttribute('height',RBOX);
    rect.setAttribute('fill', isMe?'#111':'#f4f1e8');
    rect.setAttribute('stroke','#111');rect.setAttribute('stroke-width','2');
    g.appendChild(rect);

    // 이름 라벨 아래
    const shortName = label.length>6 ? label.slice(0,6)+'...' : label;
    const text=document.createElementNS(ns,'text');
    text.setAttribute('x',pos.x);text.setAttribute('y',pos.y+RBOX/2+14);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('font-size','10');
    text.setAttribute('font-family','Noto Sans KR, sans-serif');
    text.setAttribute('font-weight','700');
    text.setAttribute('fill','#111');
    text.textContent=shortName;
    g.appendChild(text);

    // 이미지는 foreignObject로
    if(r.img){
      const fo=document.createElementNS(ns,'foreignObject');
      fo.setAttribute('x',pos.x-RBOX/2);fo.setAttribute('y',pos.y-RBOX/2);
      fo.setAttribute('width',RBOX);fo.setAttribute('height',RBOX);
      const img=document.createElement('img');
      img.src=IMGS[r.img]||'';
      img.style.cssText=`width:${RBOX}px;height:${RBOX}px;object-fit:cover;display:block;`;
      img.onerror=()=>{ img.style.display='none'; };
      fo.appendChild(img);
      g.appendChild(fo);
    }

    if(isMe){
      // "나" 표시
      const meLabel=document.createElementNS(ns,'text');
      meLabel.setAttribute('x',pos.x);meLabel.setAttribute('y',pos.y-RBOX/2-6);
      meLabel.setAttribute('text-anchor','middle');meLabel.setAttribute('font-size','10');
      meLabel.setAttribute('font-family','Noto Sans KR, sans-serif');
      meLabel.setAttribute('font-weight','900');meLabel.setAttribute('fill','#111');
      meLabel.textContent='나';
      g.appendChild(meLabel);
    }
    svg.appendChild(g);
  }

  // good 레이블
  function drawLabel(x,y,text,color){
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',x);t.setAttribute('y',y);
    t.setAttribute('text-anchor','middle');t.setAttribute('font-size','9');
    t.setAttribute('font-family','Noto Sans KR, sans-serif');
    t.setAttribute('fill',color||'#666');t.setAttribute('font-weight','700');
    t.textContent=text;
    svg.appendChild(t);
  }

  drawLabel(W/2, 16, '잘 맞는 전생', '#444');
  drawLabel(W/2, H-8, '다툴 수 있는 전생', '#aaa');

  // good 노드
  goodList.forEach((g,i)=>{
    const r=findByName(g)||{name:g,img:null};
    drawNode(goodPos[i], r, g, false);
  });
  // bad 노드
  badList.forEach((b,i)=>{
    const r=findByName(b)||{name:b,img:null};
    drawNode(badPos[i], r, b, false);
  });
  // 나 노드 (맨 마지막에 그려서 위에 올라오게)
  drawNode(mePos, me, me.name, true);
}

function showResult(){
  let sc={ax1:0,ax2:0,ax3:0,ax4:0};
  QS.forEach((q,qi)=>{
    if(q.type==='choice'&&ans[qi]!==undefined){
      Object.entries(q.opts[ans[qi]].ax).forEach(([k,v])=>{sc[k]=(sc[k]||0)+v;});
    } else if(q.type==='dot'){
      const v=ans[qi]||4;
      sc[q.axis]=(sc[q.axis]||0)+(v>4?1:v<4?-1:0);
    } else if(q.type==='color'&&ans[qi]!==undefined){
      Object.entries(q.colors[ans[qi]].ax).forEach(([k,v])=>{sc[k]=(sc[k]||0)+v;});
    } else if(q.type==='multidot'){
      q.sliders.forEach((s,i)=>{
        const v=dotVals[`${qi}_${i}`]||4;
        const n=v>4?s.lv:v<4?s.rv:0;
        sc[s.axis]=(sc[s.axis]||0)+n*0.3;
      });
    }
  });
  const tgt={ax1:sc.ax1>=0?1:-1,ax2:sc.ax2>=0?1:-1,ax3:sc.ax3>=0?1:-1,ax4:sc.ax4>=0?1:-1};
  let best=null,bestSc=-Infinity;
  RS.forEach(r=>{
    const m=Object.keys(tgt).filter(k=>Math.sign(r.axes[k])===Math.sign(tgt[k])).length;
    if(m>bestSc){bestSc=m;best=r;}
  });
  curResult=best;

  document.getElementById('test-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');
  document.getElementById('result-name').textContent=best.name;
  document.getElementById('result-desc').textContent=best.desc;

  // 메인 썸네일
  const img=document.getElementById('thumb-img');
  const ph=document.getElementById('thumb-ph');
  img.onload=()=>{img.style.display='block';ph.style.display='none';};
  img.onerror=()=>{img.style.display='none';ph.style.display='block';ph.textContent=best.name;};
  img.src=IMGS[best.img]||'';

  // 궁합 썸네일
  const goodEl=document.getElementById('compat-good-thumbs');
  const badEl=document.getElementById('compat-bad-thumbs');
  goodEl.innerHTML='';badEl.innerHTML='';
  best.good.forEach(name=>{
    const r=findByName(name);
    if(r) goodEl.appendChild(makeThumb(r.img,name,56));
    else { const d=document.createElement('div');d.className='compat-name';d.textContent=name;goodEl.appendChild(d); }
  });
  best.bad.forEach(name=>{
    const r=findByName(name);
    if(r) badEl.appendChild(makeThumb(r.img,name,56));
    else { const d=document.createElement('div');d.className='compat-name';d.textContent=name;badEl.appendChild(d); }
  });

  // 관계도
  drawRelation(best, best.good, best.bad);
}

function retryTest(){
  curQ=0;ans={};dotVals={};curResult=null;
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('intro-screen').classList.remove('hidden');
  document.getElementById('thumb-img').style.display='none';
  document.getElementById('thumb-ph').style.display='block';
}

function saveImage(){
  const W=600, PAD=32;
  const c=document.createElement('canvas');
  const ctx=c.getContext('2d');

  // 높이 계산: 썸네일+이름+설명+궁합
  const THUMB=220, NAME_H=56, DESC_LINES=7, DESC_LINE_H=22, COMPAT_H=110, FOOTER=20;
  const descText=curResult.desc;
  const totalH=PAD+THUMB+16+NAME_H+16+DESC_LINES*DESC_LINE_H+24+COMPAT_H+PAD+FOOTER;
  c.width=W; c.height=totalH;

  function draw(thumbImg){
    // 배경
    ctx.fillStyle='#f4f1e8';
    ctx.fillRect(0,0,W,totalH);

    // 줄노트 배경
    ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=1;
    for(let y=32;y<totalH;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // 외곽 테두리
    ctx.strokeStyle='#111';ctx.lineWidth=2;
    ctx.strokeRect(1,1,W-2,totalH-2);

    let y=PAD;

    // 썸네일 영역
    const TX=(W-THUMB)/2;
    ctx.fillStyle='#eae6da';ctx.fillRect(TX,y,THUMB,THUMB);
    ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.strokeRect(TX,y,THUMB,THUMB);
    if(thumbImg){
      ctx.drawImage(thumbImg,TX,y,THUMB,THUMB);
      ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.strokeRect(TX,y,THUMB,THUMB);
    }
    y+=THUMB+16;

    // 구분선
    ctx.strokeStyle='#111';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(PAD,y);ctx.lineTo(W-PAD,y);ctx.stroke();
    y+=14;

    // 이름
    ctx.fillStyle='#111';
    ctx.font='bold 28px "Noto Sans KR",sans-serif';
    ctx.textAlign='center';
    ctx.fillText(curResult.name,W/2,y+28);
    y+=NAME_H;

    // 구분선
    ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(PAD,y);ctx.lineTo(W-PAD,y);ctx.stroke();
    ctx.setLineDash([]);
    y+=14;

    // 설명 텍스트 줄바꿈
    ctx.fillStyle='#333';
    ctx.font='13px "Noto Sans KR",sans-serif';
    ctx.textAlign='left';
    const maxW=W-PAD*2;
    const words=descText.split('');
    let line='';
    let lineCount=0;
    const maxLines=8;
    for(let i=0;i<words.length;i++){
      const test=line+words[i];
      if(ctx.measureText(test).width>maxW&&line!==''){
        if(lineCount<maxLines){ctx.fillText(line,PAD,y+lineCount*DESC_LINE_H);}
        line=words[i];lineCount++;
      } else { line=test; }
    }
    if(lineCount<maxLines&&line) ctx.fillText(line,PAD,y+lineCount*DESC_LINE_H);
    const actualLines=Math.min(lineCount+1,maxLines);
    y+=actualLines*DESC_LINE_H+16;

    // 궁합 영역 배경
    const HALF=(W)/2;
    ctx.fillStyle='#e8e2cf';ctx.fillRect(0,y,HALF,COMPAT_H);
    ctx.fillStyle='#f0ece0';ctx.fillRect(HALF,y,HALF,COMPAT_H);
    ctx.strokeStyle='#111';ctx.lineWidth=2;
    ctx.strokeRect(0,y,W,COMPAT_H);
    ctx.strokeStyle='#111';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(HALF,y);ctx.lineTo(HALF,y+COMPAT_H);ctx.stroke();

    // 궁합 타이틀
    ctx.fillStyle='#777';ctx.font='bold 11px "Noto Sans KR",sans-serif';ctx.textAlign='center';
    ctx.fillText('잘 맞는 전생',HALF/2,y+18);
    ctx.fillText('다툴 수 있는 전생',HALF+HALF/2,y+18);

    // 궁합 썸네일들
    function drawCompatThumbs(names, startX, areaW, thumbImgs){
      const TW=50,TH=50;
      const totalTW=names.length*(TW+8)-8;
      let tx=startX+(areaW-totalTW)/2;
      names.forEach((name,i)=>{
        ctx.fillStyle='#eae6da';ctx.fillRect(tx,y+26,TW,TH);
        ctx.strokeStyle='#111';ctx.lineWidth=1.5;ctx.strokeRect(tx,y+26,TW,TH);
        if(thumbImgs[i]){ctx.drawImage(thumbImgs[i],tx,y+26,TW,TH);}
        ctx.fillStyle='#111';ctx.font='bold 9px "Noto Sans KR",sans-serif';ctx.textAlign='center';
        const shortN=name.length>6?name.slice(0,6)+'..':name;
        ctx.fillText(shortN,tx+TW/2,y+26+TH+12);
        tx+=TW+8;
      });
    }

    drawCompatThumbs(curResult.good,0,HALF,compatGoodImgs);
    drawCompatThumbs(curResult.bad,HALF,HALF,compatBadImgs);

    // 하단 워터마크
    ctx.fillStyle='#aaa';ctx.font='11px "Noto Sans KR",sans-serif';ctx.textAlign='center';
    ctx.fillText('전생테스트',W/2,totalH-8);

    // 다운로드
    const a=document.createElement('a');
    a.download='전생테스트_'+curResult.name+'.png';
    a.href=c.toDataURL('image/png');
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }

  // 이미지 로드
  let thumbImg=null;
  const compatGoodImgs=new Array(curResult.good.length).fill(null);
  const compatBadImgs=new Array(curResult.bad.length).fill(null);
  let loaded=0;
  const total=1+curResult.good.length+curResult.bad.length;

  function onLoad(){ loaded++; if(loaded>=total) draw(thumbImg); }

  // 메인 썸네일
  const mi=new Image();mi.crossOrigin='anonymous';
  mi.onload=()=>{thumbImg=mi;onLoad();};mi.onerror=onLoad;
  mi.src=IMGS[curResult.img]||'';
  if(!mi.src) onLoad();

  // 궁합 good
  curResult.good.forEach((name,i)=>{
    const r=findByName(name);
    if(!r){onLoad();return;}
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{compatGoodImgs[i]=img;onLoad();};img.onerror=onLoad;
    img.src=IMGS[r.img]||'';
    if(!img.src) onLoad();
  });

  // 궁합 bad
  curResult.bad.forEach((name,i)=>{
    const r=findByName(name);
    if(!r){onLoad();return;}
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{compatBadImgs[i]=img;onLoad();};img.onerror=onLoad;
    img.src=IMGS[r.img]||'';
    if(!img.src) onLoad();
  });
}

function shareX(){
  const t=encodeURIComponent(`나의 전생은 "${curResult.name}"이었다!\n당신의 전생 음식은? → `);
  const u=encodeURIComponent(window.location.href);
  window.open(`https://twitter.com/intent/tweet?text=${t}${u}`,'_blank');
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href).then(()=>alert('링크가 복사되었어요!'));
}
